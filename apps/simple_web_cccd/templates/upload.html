{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Thêm mới CCCD</h4>
                <a href="{{ url_for('index') }}" class="btn btn-light btn-sm">Quay lại</a>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('upload') }}" enctype="multipart/form-data">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="fullname" class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" id="fullname" name="fullname" required>
                        </div>
                        <div class="col-md-6">
                            <label for="id_number" class="form-label">Số CCCD</label>
                            <input type="text" class="form-control" id="id_number" name="id_number" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="dob" class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" id="dob" name="dob" required>
                        </div>
                        <div class="col-md-6">
                            <label for="address" class="form-label">Địa chỉ thường trú</label>
                            <input type="text" class="form-control" id="address" name="address" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="issue_date" class="form-label">Ngày cấp</label>
                            <input type="date" class="form-control" id="issue_date" name="issue_date" required>
                        </div>
                        <div class="col-md-6">
                            <label for="issue_place" class="form-label">Nơi cấp</label>
                            <input type="text" class="form-control" id="issue_place" name="issue_place" required>
                        </div>
                    </div>
                    
                    <hr>
                    <h5 class="mb-3">Tải lên ảnh CCCD</h5>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="photo_1" class="form-label">Ảnh mặt trước (PNG, JPG, JPEG)</label>
                            <input class="form-control" type="file" id="photo_1" name="photo_1" accept=".png,.jpg,.jpeg" required>
                        </div>
                        <div class="col-md-6">
                            <label for="photo_2" class="form-label">Ảnh mặt sau (PNG, JPG, JPEG)</label>
                            <input class="form-control" type="file" id="photo_2" name="photo_2" accept=".png,.jpg,.jpeg" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Lưu thông tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
