version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    container_name: bsmlabs_wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: bsmlabs_user
      WORDPRESS_DB_PASSWORD: bsmlabs_pass_2024
      WORDPRESS_DB_NAME: bsmlabs_wp_db
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wordpress_data:/var/www/html
      - ./bsmlabslp:/var/www/html/wp-content/themes/bsmlabslp
    depends_on:
      - db
    networks:
      - wordpress_network

  db:
    image: mysql:8.0
    container_name: bsmlabs_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bsmlabs_wp_db
      MYSQL_USER: bsmlabs_user
      MYSQL_PASSWORD: bsmlabs_pass_2024
      MYSQL_ROOT_PASSWORD: root_pass_2024
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wordpress_network
    command: '--default-authentication-plugin=mysql_native_password'

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: bsmlabs_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_pass_2024
    depends_on:
      - db
    networks:
      - wordpress_network

volumes:
  wordpress_data:
  db_data:

networks:
  wordpress_network:
    driver: bridge